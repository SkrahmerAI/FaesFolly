<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faes Folly - Tarot & Runes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Faes Folly - Mystic Readings</h1>
    
    <!-- Tarot Section -->
    <div class="tarot-container">
        <button onclick="shuffleCards()">Draw a Tarot Card</button>
        <div id="tarot-deck">
            <img id="tarot-card" src="default-card.png" alt="Tarot Card">
        </div>
    </div>

    <!-- Rune Section -->
    <div class="rune-container">
        <button onclick="drawRune()">Cast a Rune</button>
        <div id="rune-result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
